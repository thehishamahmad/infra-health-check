<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Readiness Quiz | Hisham Ahmad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="/" class="brand-link"><span class="brand-white">Hisham</span><span class="brand-blue">Ahmad</span></a>
      <div class="nav-links">
        <a href="./index.html">Overview</a>
        <a href="./index.html#importance">Why It Matters</a>
        <a href="./index.html#focus">Focus Areas</a>
        <a href="./index.html#quiz">Assessment</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="quiz-shell">
      <div class="quiz-page-header">
        <a href="./index.html" class="btn btn-secondary home-btn">← Back</a>
        <div class="quiz-page-title">
          <h2>Infrastructure Readiness Quiz</h2>
          <div class="quiz-page-line"></div>
        </div>
      </div>

      <div id="readiness-quiz">
        <div class="quiz-progress-wrap">
          <span id="question-counter">Question 1 of 14</span>
          <span id="domain-label" class="domain-pill">Infrastructure</span>
        </div>
        <div class="quiz-card">
          <h4 id="quiz-question-title"></h4>
          <div id="quiz-options"></div>
          <div class="quiz-nav">
            <button class="btn btn-secondary" id="prev-btn" type="button">Previous</button>
            <button class="btn btn-primary" id="next-btn" type="button">Next</button>
          </div>
        </div>
      </div>

      <section id="result" class="results-dashboard"></section>
    </div>
  </main>

<script>
const quizData = [
  {domain:'Infrastructure', question:'How many physical or virtual servers currently support your business-critical applications?', options:[['1–2 servers',1,'infrastructure'],['3–5 servers',2,'infrastructure'],['6–10 servers',3,'infrastructure'],['More than 10 servers',4,'infrastructure']]},
  {domain:'Infrastructure', question:'Are your critical systems currently running with redundancy?', options:[['No redundancy',1,'availability'],['Partial redundancy',2,'availability'],['Redundant within the same site',3,'availability'],['Fully redundant across multiple sites or zones',4,'availability']]},
  {domain:'Availability & DR', question:'If a critical server fails, how long would it typically take to restore operations?', options:[['More than 24 hours',1,'dr'],['8–24 hours',2,'dr'],['1–8 hours',3,'dr'],['Less than 1 hour',4,'dr']]},
  {domain:'Availability & DR', question:'How frequently are backups performed for your critical systems?', options:[['No backup',1,'backup'],['Weekly',2,'backup'],['Daily',3,'backup'],['Multiple times per day',4,'backup']]},
  {domain:'Availability & DR', question:'Have you tested your backup restore process within the last 12 months?', options:[['Never tested',1,'backup'],['Tested more than 12 months ago',2,'backup'],['Tested within the last 12 months',3,'backup'],['Tested regularly every quarter',4,'backup']]},
  {domain:'Availability & DR', question:'What is your acceptable Recovery Point Objective (RPO)?', options:[['More than 24 hours of data loss is acceptable',1,'dr'],['Up to 24 hours of data loss',2,'dr'],['Less than 4 hours of data loss',3,'dr'],['Near-zero or no data loss',4,'dr']]},
  {domain:'Availability & DR', question:'Do you currently have a documented Disaster Recovery plan?', options:[['No DR plan',1,'dr'],['Informal or undocumented DR process',2,'dr'],['Documented DR plan',3,'dr'],['Documented and regularly tested DR plan',4,'dr']]},
  {domain:'Storage & Growth', question:'Approximately how much storage is currently used by your organization?', options:[['Less than 1 TB',4,'storage'],['1–10 TB',3,'storage'],['10–50 TB',2,'storage'],['More than 50 TB',1,'storage']]},
  {domain:'Storage & Growth', question:'How quickly is your storage requirement growing?', options:[['Minimal growth',4,'storage'],['10–20% per year',3,'storage'],['20–50% per year',2,'storage'],['More than 50% per year',1,'storage']]},
  {domain:'Storage & Growth', question:'How long do you need to retain business or compliance-related data?', options:[['Less than 1 year',4,'storage'],['1–3 years',3,'storage'],['3–7 years',2,'storage'],['More than 7 years',1,'storage']]},
  {domain:'Network', question:'How would you describe your current network connectivity?', options:[['Single internet connection only',1,'network'],['Redundant internet links',2,'network'],['Hybrid connectivity with VPN',3,'network'],['Dedicated, resilient hybrid connectivity',4,'network']]},
  {domain:'Network', question:'Do your users currently experience application latency or performance issues?', options:[['Frequently',1,'network'],['Occasionally',2,'network'],['Rarely',3,'network'],['Almost never',4,'network']]},
  {domain:'Network & Security', question:'Are your critical systems currently exposed directly to the public internet?', options:[['Yes, without protection',1,'security'],['Yes, with basic firewall protection',2,'security'],['Protected with load balancer / VPN',3,'security'],['Fully protected and segmented',4,'security']]},
  {domain:'Business Growth', question:'How confident are you that your current infrastructure can support business growth over the next 2 years?', options:[['Not confident',1,'scalability'],['Somewhat confident',2,'scalability'],['Confident',3,'scalability'],['Very confident',4,'scalability']]}
];

const areaInfo = {
  infrastructure:['Infrastructure Baseline','Review server footprint, workload criticality, capacity planning, and current architecture readiness.'],
  availability:['High Availability','Remove single points of failure and improve service continuity across critical systems.'],
  dr:['Disaster Recovery Readiness','Improve RTO/RPO alignment, DR documentation, recovery design, and periodic DR testing.'],
  backup:['Backup & Restore Confidence','Strengthen backup frequency, restore validation, recovery assurance, and data protection coverage.'],
  storage:['Storage Growth Planning','Assess data growth, retention, archive strategy, and future storage scalability.'],
  network:['Network Resilience','Improve network redundancy, hybrid connectivity, latency management, and performance readiness.'],
  security:['Exposure & Segmentation','Reduce direct public exposure and improve segmentation, secure access, and protected connectivity.'],
  scalability:['Scalability & Growth Readiness','Ensure infrastructure capacity and architecture can support business growth over the next 24 months.']
};

let currentQuestion = 0;
let answers = new Array(quizData.length).fill(null);
const questionCounter = document.getElementById('question-counter');
const domainLabel = document.getElementById('domain-label');
const questionTitle = document.getElementById('quiz-question-title');
const optionsContainer = document.getElementById('quiz-options');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const resultContainer = document.getElementById('result');
const quizContainer = document.getElementById('readiness-quiz');

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function selectedScore(i){return quizData[i].options[answers[i]][1];}
function selectedArea(i){return quizData[i].options[answers[i]][2];}

function renderQuestion(){
  const item = quizData[currentQuestion];
  questionCounter.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
  domainLabel.textContent = item.domain;
  questionTitle.textContent = item.question;
  optionsContainer.innerHTML = '';
  item.options.forEach((option, index) => {
    const btn = document.createElement('div');
    btn.className = 'quiz-option' + (answers[currentQuestion] === index ? ' selected' : '');
    btn.textContent = option[0];
    btn.onclick = () => { answers[currentQuestion] = index; renderQuestion(); };
    optionsContainer.appendChild(btn);
  });
  prevBtn.style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
  nextBtn.textContent = currentQuestion === quizData.length - 1 ? 'Generate Assessment' : 'Next';
}

function getCategory(score){
  if(score <= 35) return ['Critical Risk Exposure','critical','The environment shows multiple infrastructure weaknesses that may create significant risk of downtime, prolonged recovery, data loss, or performance disruption.'];
  if(score <= 58) return ['Moderate Readiness Gap','medium','The environment has some resilience, but important gaps remain in recovery readiness, redundancy, storage planning, or network resilience.'];
  if(score <= 78) return ['Stable with Improvement Areas','average','The environment appears generally stable for current operations, but there are opportunities to improve resilience, scalability, DR maturity, and long-term readiness.'];
  return ['Strong Infrastructure Readiness','excellent','The environment demonstrates strong infrastructure maturity with good resilience, recovery capability, and scalability for business continuity.'];
}

function domainScore(areas){
  const idx = quizData.map((q,i)=>areas.includes(selectedArea(i)) ? i : null).filter(i=>i!==null);
  if(!idx.length) return 0;
  const total = idx.reduce((s,i)=>s+selectedScore(i),0);
  return Math.round((total/(idx.length*4))*100);
}

function renderBar(label,value,type){
  return `<div class="domain-bar-container"><div class="domain-bar-label"><span>${label}</span><span>${value}%</span></div><div class="domain-bar-track"><div class="domain-bar-fill ${type}" style="width:${value}%"></div></div></div>`;
}

function renderAreas(sorted){
  const fallback = ['availability','dr','backup','storage','network','security','scalability'];
  return [...new Set([...sorted,...fallback])].slice(0,6).map(k=>{
    const a = areaInfo[k];
    return a ? `<div class="optimization-card"><strong>${a[0]}</strong><span>${a[1]}</span></div>` : '';
  }).join('');
}

function renderPriorities(sorted,score){
  const map = {
    infrastructure:'Establish a clear infrastructure baseline covering servers, workloads, capacity, and single points of failure.',
    availability:'Improve redundancy for critical systems and remove single points of failure.',
    dr:'Document and test the Disaster Recovery plan with clear RTO and RPO expectations.',
    backup:'Validate backup coverage and perform regular restore testing.',
    storage:'Review storage growth, retention policy, and archive strategy before capacity pressure increases.',
    network:'Strengthen network redundancy, hybrid connectivity, and performance visibility.',
    security:'Reduce direct public exposure and improve segmentation or protected access.',
    scalability:'Review future capacity planning to support business growth over the next 24 months.'
  };
  let priorities = sorted.map(k=>map[k]).filter(Boolean);
  if(score <= 35) priorities.unshift('Address immediate resilience gaps before they become downtime or data loss incidents.');
  return [...new Set(priorities)].slice(0,3).map(x=>`<li>${x}</li>`).join('');
}

function nextAction(score){
  if(score <= 35) return 'Start with an urgent infrastructure discovery and resilience review. Focus first on backup coverage, redundancy, recovery capability, and removal of single points of failure.';
  if(score <= 58) return 'Conduct a structured infrastructure health check workshop to validate recovery expectations, backup restore confidence, storage growth, and network resilience.';
  if(score <= 78) return 'Proceed with targeted improvement planning around DR testing, capacity planning, network resilience, and operational monitoring.';
  return 'Maintain the current maturity level through periodic DR testing, backup validation, capacity planning, and continuous infrastructure optimization reviews.';
}

function calculateScore(){
  if(answers.some(a=>a===null)){ alert('Please answer all questions before calculating the result.'); return; }
  const raw = answers.reduce((sum,_,i)=>sum+selectedScore(i),0);
  const score = Math.round((raw/(quizData.length*4))*100);
  const risk = clamp(100-score,5,95);
  const [label, cls, summary] = getCategory(score);
  const resilience = domainScore(['infrastructure','availability','scalability']);
  const dr = domainScore(['dr','backup']);
  const storage = domainScore(['storage']);
  const network = domainScore(['network','security']);
  const risks = {};
  answers.forEach((_,i)=>{ const area = selectedArea(i); risks[area]=(risks[area]||0)+(5-selectedScore(i)); });
  const sorted = Object.entries(risks).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  quizContainer.style.display = 'none';
  resultContainer.innerHTML = `<div class="glass-card"><div class="results-grid"><div class="score-card"><p class="eyebrow-result">Infrastructure Health Score</p><h2 class="big-score">${score}%</h2><div class="status-badge ${cls}">${label}</div><p class="summary-text">${summary}</p><div class="domain-breakdown">${renderBar('Risk Exposure',risk,'risk')}${renderBar('Resilience Readiness',resilience,'success')}${renderBar('Backup & DR Maturity',dr,'success')}${renderBar('Storage Readiness',storage,'warning')}${renderBar('Network Readiness',network,'success')}</div></div><div class="insights-column"><div class="panel-block"><h3>Executive Summary</h3><p>${summary}</p></div><div class="panel-block"><h4>Recommended Improvement Areas</h4><div class="priority-grid">${renderAreas(sorted)}</div></div><div class="panel-block"><h4>Top 3 Immediate Priorities</h4><ol class="priority-list">${renderPriorities(sorted,score)}</ol></div><div class="panel-block"><h4>Suggested Next Action Plan</h4><p>${nextAction(score)}</p></div><div class="action-row"><button class="btn btn-secondary" onclick="window.print()">Print / Save PDF</button><button class="btn btn-secondary" onclick="restartQuiz()">Retake Assessment</button><a href="mailto:mohd.hisham@outlook.my?subject=Infrastructure%20Health%20Check%20Advisory%20Session" class="btn btn-primary">Book Advisory Session</a></div></div></div></div>`;
  resultContainer.style.display = 'block';
  window.scrollTo({top:resultContainer.offsetTop-90,behavior:'smooth'});
}

function restartQuiz(){
  currentQuestion = 0;
  answers = new Array(quizData.length).fill(null);
  resultContainer.innerHTML = '';
  resultContainer.style.display = 'none';
  quizContainer.style.display = 'block';
  renderQuestion();
  window.scrollTo({top:quizContainer.offsetTop-90,behavior:'smooth'});
}

prevBtn.addEventListener('click',()=>{ if(currentQuestion>0){ currentQuestion--; renderQuestion(); } });
nextBtn.addEventListener('click',()=>{
  if(answers[currentQuestion]===null){ alert('Please select one answer before proceeding.'); return; }
  if(currentQuestion===quizData.length-1) calculateScore(); else { currentQuestion++; renderQuestion(); }
});
renderQuestion();
</script>
</body>
</html>
